plugins {
    id "com.android.application"
    id "kotlin-android"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace = "com.movliq.app"
    compileSdk = flutter.compileSdkVersion
    ndkVersion = flutter.ndkVersion

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_1_8
        targetCompatibility = JavaVersion.VERSION_1_8
        coreLibraryDesugaringEnabled true
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_1_8
    }

    defaultConfig {
        // TODO: Specify your own unique Application ID (https://developer.android.com/studio/build/application-id.html).
        applicationId = "com.movliq.app"
        // You can update the following values to match your application needs.
        // For more information, see: https://flutter.dev/to/review-gradle-config.
        minSdk = flutter.minSdkVersion
        targetSdk = flutter.targetSdkVersion
        versionCode = flutter.versionCode
        versionName = flutter.versionName
    }

    buildTypes {
        release {
            // TODO: Add your own signing config for the release build.
            // Signing with the debug keys for now, so `flutter run --release` works.
            signingConfig = signingConfigs.debug
        }
    }
}

flutter {
    source = "../.."
}

// Bağımlılıkları eklemek için dependencies bloğu
dependencies {
    implementation 'com.microsoft.signalr:signalr:5.0.17' // SignalR Java Client
    implementation "org.jetbrains.kotlinx:kotlinx-coroutines-android:1.7.3"
    implementation 'com.google.android.gms:play-services-location:21.2.0'
    implementation 'com.google.code.gson:gson:2.10.1'
    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.0.4'

    // ===== RXJAVA 3 KALDIRILDI, RXJAVA 2 EKLENDİ =====
    // implementation 'io.reactivex.rxjava3:rxjava:3.1.8'
    // implementation 'io.reactivex.rxjava3:rxkotlin:3.0.1'
    // implementation "org.jetbrains.kotlinx:kotlinx-coroutines-rx3:1.7.3"
    implementation 'io.reactivex.rxjava2:rxjava:2.2.21' // RxJava 2 Core
    implementation "org.jetbrains.kotlinx:kotlinx-coroutines-rx2:1.7.3" // Coroutine RxJava2 Interop
    // ================================================

    // Diğer mevcut bağımlılıklarınız varsa buraya eklenir
    // implementation "androidx.core:core-ktx:1.9.0"
    // ...
}